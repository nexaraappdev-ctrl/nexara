<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut as fbSignOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { firebaseConfig, BACKEND_URL } from "./js/config.js";

/* ================= INIT ================= */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= STATE ================= */
let currentUser = null;
let userData = null;

let socket = null;
let pc = null;
let localStream = null;

let partnerId = null;
let partnerName = "Stranger";

window.currentChatPartner = null;

let camOn = true;
let micOn = true;
let screenSharing = false;

let selectedReason = "";
let authReady = false;

const ICE_SERVERS = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

/* ================= AUTH ================= */
onAuthStateChanged(auth, async (user) => {
  authReady = true;

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const snap = await getDoc(doc(db, "users", user.uid));
  userData = snap.exists()
    ? snap.data()
    : { role: "user", displayName: "User" };

  document.getElementById("user-name").textContent = userData.displayName;

  const roleEl = document.getElementById("role-display");
  roleEl.textContent = userData.role;
  roleEl.className = `role-badge role-${userData.role}`;

  const staffRoles = ["moderator", "admin", "manager", "founder"];
  if (staffRoles.includes(userData.role)) {
    document.getElementById("admin-btn").style.display = "flex";
  }

  initSocket();
});

/* ================= SOCKET ================= */
function initSocket() {
  socket = window.io(BACKEND_URL, {
    transports: ["websocket", "polling"]
  });

  socket.on("waiting", () => {
    document.getElementById("waiting-text").textContent =
      "Looking for someone...";
  });

  socket.on("matched", async ({ partnerId: pid, initiator, partnerName: pn }) => {
    partnerId = pid;
    partnerName = pn || "Stranger";
    window.currentChatPartner = pid;

    document.getElementById("remote-label").textContent = partnerName;
    document.getElementById("remote-status").classList.add("hidden");

    addSysMsg(`Connected to ${partnerName}`);
    await setupPeer(initiator);
  });

  socket.on("signal", async ({ from, data }) => {
    if (!pc) return;

    if (data.type === "offer") {
      await pc.setRemoteDescription(new RTCSessionDescription(data));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit("signal", { to: from, data: answer });

    } else if (data.type === "answer") {
      await pc.setRemoteDescription(new RTCSessionDescription(data));

    } else if (data.candidate) {
      await pc.addIceCandidate(new RTCIceCandidate(data));
    }
  });

  socket.on("partner-disconnected", () => {
    addSysMsg("Partner disconnected.");
    resetPeer();

    document.getElementById("remote-status").classList.remove("hidden");
    document.getElementById("remote-status-text").textContent =
      "Press Next to find someone new";

    partnerId = null;
    window.currentChatPartner = null;
  });

  socket.on("skipped", () => {
    resetPeer();
    partnerId = null;
    window.currentChatPartner = null;
  });
}

/* ================= PEER ================= */
async function setupPeer(initiator) {
  pc = new RTCPeerConnection(ICE_SERVERS);

  if (localStream) {
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }

  pc.ontrack = (e) => {
    if (e.streams?.[0]) {
      document.getElementById("remote-video").srcObject = e.streams[0];
    }
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit("signal", {
        to: partnerId,
        data: e.candidate
      });
    }
  };

  pc.onconnectionstatechange = () => {
    if (["failed", "disconnected", "closed"].includes(pc.connectionState)) {
      addSysMsg("Connection lost.");
    }
  };

  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { to: partnerId, data: offer });
  }
}

/* ================= RESET ================= */
function resetPeer() {
  if (pc) {
    pc.close();
    pc = null;
  }

  document.getElementById("remote-video").srcObject = null;
}

/* ================= START ================= */
window.startChat = async () => {
  if (!authReady || !socket || !currentUser || !userData) return;

  document.getElementById("start-btn").classList.add("hidden");
  document.getElementById("next-btn").classList.remove("hidden");
  document.getElementById("cam-btn").classList.remove("hidden");
  document.getElementById("mic-btn").classList.remove("hidden");
  document.getElementById("screen-btn").classList.remove("hidden");

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: camOn,
      audio: micOn
    });

    document.getElementById("local-video").srcObject = localStream;
    document.getElementById("local-status").classList.add("hidden");

  } catch (e) {
    addSysMsg("No camera/mic access — text mode only.");
    localStream = null;
  }

  socket.emit("find-partner", {
    uid: currentUser.uid,
    displayName: userData.displayName
  });
};

/* ================= NEXT ================= */
window.nextPartner = () => {
  addSysMsg("Searching new partner...");

  socket.emit("skip");

  resetPeer();

  partnerId = null;

  document.getElementById("remote-video").srcObject = null;
  document.getElementById("remote-status").classList.remove("hidden");

  socket.emit("find-partner", {
    uid: currentUser.uid,
    displayName: userData.displayName
  });
};

/* ================= CHAT ================= */
window.sendMessage = () => {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();

  if (!msg || !partnerId) return;

  socket.emit("chat-message", {
    to: partnerId,
    message: msg,
    displayName: userData.displayName
  });

  addMsg(msg, "You", "mine");
  input.value = "";
};

window.onChatKey = (e) => {
  if (e.key === "Enter") sendMessage();
};

/* ================= UI ================= */
function addMsg(text, name, type) {
  const box = document.getElementById("messages");
  const div = document.createElement("div");

  div.className = `msg-item ${type}`;

  div.innerHTML =
    type !== "system"
      ? `<div class="msg-name">${name}</div><div>${esc(text)}</div>`
      : esc(text);

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function addSysMsg(text) {
  addMsg(text, "", "system");
}

function esc(t) {
  return t.replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
}

/* ================= REPORT ================= */
window.selectReason = (btn, reason) => {
  document.querySelectorAll(".reason-btn").forEach(b =>
    b.classList.remove("selected")
  );

  btn.classList.add("selected");
  selectedReason = reason;
};

window.submitReport = async () => {
  if (!selectedReason) return alert("Select reason");

  const notes = document.getElementById("report-notes").value.trim();

  await addDoc(collection(db, "reports"), {
    reporterId: currentUser.uid,
    reporterName: userData.displayName,
    reportedUserId: partnerId,
    reportedUserName: partnerName,
    reason: selectedReason,
    notes,
    status: "pending",
    createdAt: serverTimestamp()
  });

  addSysMsg("Report sent.");
};

/* ================= SIGN OUT ================= */
window.signOut = () =>
  document.getElementById("signout-modal").classList.add("open");

window.closeModal = () =>
  document.getElementById("signout-modal").classList.remove("open");

window.confirmSignOut = async () => {
  await fbSignOut(auth);
  window.location.href = "index.html";
};
</script>
