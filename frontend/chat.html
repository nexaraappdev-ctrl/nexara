<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexara</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --accent: #7c3aed; --accent2: #06b6d4; --text: #e2e2f0;
      --muted: #6b6b8a; --danger: #ef4444; --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* HEADER */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .logo-sm { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .role-badge {
      padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .role-user { background: rgba(107,107,138,0.2); color: var(--muted); border: 1px solid rgba(107,107,138,0.3); }
    .role-vip { background: rgba(234,179,8,0.15); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }
    .role-moderator { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .role-admin { background: rgba(6,182,212,0.15); color: var(--accent2); border: 1px solid rgba(6,182,212,0.3); }
    .role-manager { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
    .role-founder { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

    .btn-icon {
      width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--muted); cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.2s; font-size: 1rem;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--text); }

    /* MAIN LAYOUT */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* VIDEO AREA */
    .video-area { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; min-width: 0; }
    .videos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; min-height: 0; }
    .video-box {
      border-radius: 14px; overflow: hidden; position: relative;
      background: #0d0d15; border: 1px solid var(--border);
    }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-label {
      position: absolute; bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.6); padding: 4px 10px;
      border-radius: 6px; font-size: 0.75rem; backdrop-filter: blur(4px);
    }
    .status-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--muted); font-size: 0.85rem;
    }
    .status-icon { font-size: 2.5rem; opacity: 0.3; }

    /* CONTROLS */
    .controls {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      flex-wrap: wrap; flex-shrink: 0;
    }
    .ctrl-btn {
      padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s; display: flex;
      align-items: center; gap: 7px;
    }
    .ctrl-btn:hover { border-color: var(--accent); }
    .ctrl-btn.active { background: rgba(124,58,237,0.2); border-color: var(--accent); color: #c4b5fd; }
    .ctrl-btn.muted { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: #f87171; }
    .ctrl-btn.danger { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #f87171; }
    .ctrl-btn.next { background: linear-gradient(135deg, var(--accent), #5b21b6); border-color: var(--accent); color: white; font-weight: 700; }
    .ctrl-btn.next:hover { opacity: 0.9; }
    #waiting-text { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.05em; }

    /* SIDEBAR */
    .sidebar {
      width: 320px; border-left: 1px solid var(--border);
      background: var(--surface); display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .stab {
      flex: 1; padding: 12px 8px; border: none; background: transparent;
      color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem;
      cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .stab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* CHAT */
    .chat-panel, .report-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg-item { padding: 8px 12px; border-radius: 10px; font-size: 0.82rem; line-height: 1.5; }
    .msg-item.mine { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.2); margin-left: 20px; }
    .msg-item.theirs { background: var(--bg); border: 1px solid var(--border); margin-right: 20px; }
    .msg-item.system { color: var(--muted); font-size: 0.75rem; text-align: center; background: transparent; border: none; }
    .msg-name { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; }

    .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
    .chat-input input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem; outline: none;
    }
    .chat-input input:focus { border-color: var(--accent); }
    .send-btn {
      padding: 10px 14px; border-radius: 8px; border: none;
      background: var(--accent); color: white; cursor: pointer; font-size: 1rem;
      transition: opacity 0.2s;
    }
    .send-btn:hover { opacity: 0.85; }

    /* REPORT */
    .report-panel { padding: 16px; }
    .report-panel h3 { font-family: 'Syne', sans-serif; font-size: 0.9rem; margin-bottom: 14px; color: var(--text); }
    .report-reasons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .reason-btn {
      padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 0.8rem; cursor: pointer; text-align: left; transition: all 0.2s;
    }
    .reason-btn:hover, .reason-btn.selected { border-color: var(--danger); color: #f87171; background: rgba(239,68,68,0.05); }
    .report-notes {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem;
      resize: none; outline: none; margin-bottom: 12px;
    }
    .report-notes:focus { border-color: var(--accent); }
    .submit-report {
      width: 100%; padding: 11px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.4);
      background: rgba(239,68,68,0.1); color: #f87171; font-family: 'DM Mono', monospace;
      font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .submit-report:hover { background: rgba(239,68,68,0.2); }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 28px; max-width: 380px; width: 90%;
    }
    .modal h3 { font-family: 'Syne', sans-serif; margin-bottom: 16px; }
    .modal p { color: var(--muted); font-size: 0.85rem; line-height: 1.6; margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 11px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .modal-btns button.confirm { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: #f87171; }
    .modal-btns button:hover { border-color: var(--accent); }

    .hidden { display: none !important; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .videos { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <span class="logo-sm">Nexara</span>
    <div class="header-right">
      <span class="role-badge role-user" id="role-display">user</span>
      <span id="user-name" style="font-size:0.8rem;color:var(--muted)"></span>
      <button class="btn-icon" title="Admin Panel" id="admin-btn" onclick="window.location.href='admin.html'" style="display:none">⚙️</button>
      <button class="btn-icon" title="Sign Out" onclick="signOut()">🚪</button>
    </div>
  </header>

  <div class="main">
    <div class="video-area">
      <div class="videos">
        <div class="video-box">
          <video id="local-video" autoplay muted playsinline></video>
          <div class="video-label" id="local-label">You</div>
          <div class="status-overlay" id="local-status">
            <div class="status-icon">📷</div>
            <span>Camera off</span>
          </div>
        </div>
        <div class="video-box">
          <video id="remote-video" autoplay playsinline></video>
          <div class="video-label" id="remote-label">Stranger</div>
          <div class="status-overlay" id="remote-status">
            <div class="status-icon">👤</div>
            <span id="remote-status-text">Waiting for partner...</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <span id="waiting-text">Press Start to connect</span>
        <button class="ctrl-btn next" id="start-btn" onclick="startChat()">▶ Start</button>
        <button class="ctrl-btn hidden" id="next-btn" onclick="nextPartner()">⏭ Next</button>
        <button class="ctrl-btn hidden" id="cam-btn" onclick="toggleCamera()">📷 Camera</button>
        <button class="ctrl-btn hidden" id="mic-btn" onclick="toggleMic()">🎙 Mic</button>
        <button class="ctrl-btn hidden" id="screen-btn" onclick="toggleScreen()">🖥 Screen</button>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="stab active" onclick="showPanel('chat')">💬 Chat</button>
        <button class="stab" onclick="showPanel('report')">🚩 Report</button>
      </div>

      <div class="chat-panel" id="chat-panel">
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="onChatKey(event)" />
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>

      <div class="report-panel hidden" id="report-panel">
        <h3>🚩 Report User</h3>
        <div class="report-reasons" id="report-reasons">
          <button class="reason-btn" onclick="selectReason(this, 'Inappropriate content')">🔞 Inappropriate content</button>
          <button class="reason-btn" onclick="selectReason(this, 'Harassment / bullying')">😡 Harassment / bullying</button>
          <button class="reason-btn" onclick="selectReason(this, 'Spam / bot')">🤖 Spam / bot</button>
          <button class="reason-btn" onclick="selectReason(this, 'Underage user')">⚠️ Underage user</button>
          <button class="reason-btn" onclick="selectReason(this, 'Other')">❓ Other</button>
        </div>
        <textarea class="report-notes" id="report-notes" rows="3" placeholder="Additional details (optional)..."></textarea>
        <button class="submit-report" onclick="submitReport()">Submit Report</button>
      </div>
    </div>
  </div>

  <!-- Sign out confirm modal -->
  <div class="modal-overlay" id="signout-modal">
    <div class="modal">
      <h3>Sign Out?</h3>
      <p>Are you sure you want to sign out of Nexara?</p>
      <div class="modal-btns">
        <button onclick="closeModal()">Cancel</button>
        <button class="confirm" onclick="confirmSignOut()">Sign Out</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut as fbSignOut }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { firebaseConfig, BACKEND_URL } from "./js/config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null, userData = null;
    let socket = null, pc = null;
    let localStream = null, partnerId = null, partnerName = "Stranger";

    window.currentChatPartner = null;

    let camOn = true, micOn = true, screenSharing = false;
    let selectedReason = "";

    const ICE_SERVERS = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

    // --- Auth ---
let authReady = false;

onAuthStateChanged(auth, async (user) => {
  authReady = true;

  if (!user) {
    window.location.href = "index.html";
    return;
  }
      currentUser = user;
      const snap = await getDoc(doc(db, "users", user.uid));
      userData = snap.exists() ? snap.data() : { role: "user", displayName: user.displayName || "User" };

      document.getElementById("user-name").textContent = userData.displayName;
      const roleEl = document.getElementById("role-display");
      roleEl.textContent = userData.role;
      roleEl.className = `role-badge role-${userData.role}`;

      const staffRoles = ["moderator", "admin", "manager", "founder"];
      if (staffRoles.includes(userData.role)) {
        document.getElementById("admin-btn").style.display = "flex";
      }

      initSocket();
    });

function initSocket() {
  socket = window.io(BACKEND_URL, {
    transports: ["websocket", "polling"]
  });

  socket.on("connect", () => {
    console.log("Connected to backend:", socket.id);
  });

  socket.on("waiting", () => {
    document.getElementById("waiting-text").textContent = "Looking for someone...";
    document.getElementById("remote-status-text").textContent = "Searching...";
  });

  socket.on("matched", async ({ partnerId: pid, initiator, partnerName: pn }) => {
    partnerId = pid;
    partnerName = pn || "Stranger";
    window.currentChatPartner = pid;

    document.getElementById("remote-label").textContent = partnerName;
    document.getElementById("remote-status").classList.add("hidden");
    document.getElementById("waiting-text").textContent = `Connected to ${partnerName}`;

    addSysMsg(`Connected to ${partnerName}`);
    await setupPeer(initiator);
  });

  socket.on("signal", async ({ from, data }) => {
    if (!pc) return;

    if (data.type === "offer") {
      await pc.setRemoteDescription(new RTCSessionDescription(data));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit("signal", { to: from, data: answer });

    } else if (data.type === "answer") {
      await pc.setRemoteDescription(new RTCSessionDescription(data));

    } else if (data.candidate) {
      await pc.addIceCandidate(new RTCIceCandidate(data));
    }
  });

  socket.on("chat-message", ({ message, displayName }) => {
    addMsg(message, displayName, "theirs");
  });

  socket.on("partner-disconnected", () => {
    addSysMsg("Partner disconnected.");
    resetPeer();
    document.getElementById("remote-status").classList.remove("hidden");
    document.getElementById("remote-status-text").textContent = "Press Next to find someone new";
    document.getElementById("waiting-text").textContent = "Disconnected";
    partnerId = null;
    window.currentChatPartner = null;
  });

  socket.on("skipped", () => {
    resetPeer();
    document.getElementById("remote-status-text").textContent = "Searching...";
    window.currentChatPartner = null;
  });
}

    async function setupPeer(initiator) {
      pc = new RTCPeerConnection(ICE_SERVERS);
      if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      pc.ontrack = (e) => {
        document.getElementById("remote-video").srcObject = e.streams[0];
      };
      pc.onicecandidate = (e) => {
        if (e.candidate) socket.emit("signal", { to: partnerId, data: e.candidate });
      };
      pc.onconnectionstatechange = () => {
        if (["disconnected","failed","closed"].includes(pc.connectionState)) {
          addSysMsg("Connection lost.");
        }
      };

      if (initiator) {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit("signal", { to: partnerId, data: offer });
      }
    }

    function resetPeer() {
      if (pc) { pc.close(); pc = null; }
      document.getElementById("remote-video").srcObject = null;
      window.currentChatPartner = null;
    }

// --- Controls ---

window.startChat = async () => {
  if (!authReady || !socket || !currentUser || !userData) {
    addSysMsg("Still loading... try again in a second.");
    return;
  }

  document.getElementById("start-btn").classList.add("hidden");
  document.getElementById("next-btn").classList.remove("hidden");
  document.getElementById("cam-btn").classList.remove("hidden");
  document.getElementById("mic-btn").classList.remove("hidden");
  document.getElementById("screen-btn").classList.remove("hidden");

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById("local-video").srcObject = localStream;
    document.getElementById("local-status").classList.add("hidden");
  } catch (e) {
    addSysMsg("Camera/mic denied — connecting without.");
    localStream = null;
  }

  socket.emit("find-partner", {
    uid: currentUser.uid,
    displayName: userData.displayName
  });
};

window.nextPartner = () => {
  addSysMsg("Looking for next person...");
  socket.emit("skip");

  partnerId = null;

  document.getElementById("remote-video").srcObject = null;
  document.getElementById("remote-label").textContent = "Stranger";
  document.getElementById("remote-status").classList.remove("hidden");

  socket.emit("find-partner", {
    uid: currentUser.uid,
    displayName: userData.displayName
  });
};
window.toggleCamera = () => {
  if (!localStream) return;

  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);

  const btn = document.getElementById("cam-btn");
  btn.classList.toggle("muted", !camOn);
  btn.textContent = camOn ? "📷 Camera" : "📷 Off";

  document.getElementById("local-status").classList.toggle("hidden", camOn);
};

window.toggleMic = () => {
  if (!localStream) return;

  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);

  const btn = document.getElementById("mic-btn");
  btn.classList.toggle("muted", !micOn);
  btn.textContent = micOn ? "🎙 Mic" : "🎙 Off";
};

    window.toggleScreen = async () => {
      if (!pc) return;
      try {
        if (!screenSharing) {
          const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
          const screenTrack = screenStream.getVideoTracks()[0];
          const sender = pc.getSenders().find(s => s.track?.kind === "video");
          if (sender) sender.replaceTrack(screenTrack);
          document.getElementById("local-video").srcObject = screenStream;
          document.getElementById("screen-btn").classList.add("active");
          document.getElementById("screen-btn").textContent = "🖥 Stop";
          screenSharing = true;
          screenTrack.onended = () => stopScreen();
        } else { stopScreen(); }
      } catch (e) { addSysMsg("Screen share cancelled."); }
    };

    async function stopScreen() {
      screenSharing = false;
      if (localStream) {
        document.getElementById("local-video").srcObject = localStream;
        const sender = pc?.getSenders().find(s => s.track?.kind === "video");
        if (sender) sender.replaceTrack(localStream.getVideoTracks()[0]);
      }
      document.getElementById("screen-btn").classList.remove("active");
      document.getElementById("screen-btn").textContent = "🖥 Screen";
    }

    // --- Chat ---
    window.sendMessage = () => {
      const input = document.getElementById("chat-input");
      const msg = input.value.trim();
      if (!msg || !partnerId) return;
      socket.emit("chat-message", { to: partnerId, message: msg, displayName: userData.displayName });
      addMsg(msg, "You", "mine");
      input.value = "";
    };
    window.onChatKey = (e) => { if (e.key === "Enter") sendMessage(); };

    function addMsg(text, name, type) {
      const box = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `msg-item ${type}`;
      div.innerHTML = type !== "system" ? `<div class="msg-name">${name}</div><div>${escHtml(text)}</div>` : escHtml(text);
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }
    function addSysMsg(text) { addMsg(text, "", "system"); }
    function escHtml(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    // --- Report ---
    window.showPanel = (p) => {
      document.querySelectorAll(".stab").forEach((t,i) => t.classList.toggle("active", (p === "chat" && i===0)||(p==="report"&&i===1)));
      document.getElementById("chat-panel").classList.toggle("hidden", p !== "chat");
      document.getElementById("report-panel").classList.toggle("hidden", p !== "report");
    };

    window.selectReason = (btn, reason) => {
      document.querySelectorAll(".reason-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedReason = reason;
    };

    window.submitReport = async () => {
      if (!selectedReason) { alert("Please select a reason."); return; }
      const notes = document.getElementById("report-notes").value.trim();
      await addDoc(collection(db, "reports"), {
        reporterId: currentUser.uid,
        reporterName: userData.displayName,
        reportedUserId: partnerId,
	reportedUserName: partnerName,
	reportedSocketId: partnerId,
        reason: selectedReason,
        notes,
        status: "pending",
        createdAt: serverTimestamp(),
      });
      addSysMsg("Report submitted. Thank you.");
      document.querySelectorAll(".reason-btn").forEach(b => b.classList.remove("selected"));
      document.getElementById("report-notes").value = "";
      selectedReason = "";
      showPanel("chat");
    };

    // --- Sign Out ---
    window.signOut = () => document.getElementById("signout-modal").classList.add("open");
    window.closeModal = () => document.getElementById("signout-modal").classList.remove("open");
    window.confirmSignOut = async () => { await fbSignOut(auth); window.location.href = "index.html"; };
  </script>
</body>
</html>
