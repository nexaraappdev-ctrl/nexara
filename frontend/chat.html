<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexara</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --accent: #7c3aed; --accent2: #06b6d4; --text: #e2e2f0;
      --muted: #6b6b8a; --danger: #ef4444; --success: #22c55e;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo-sm {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .main { display: flex; flex: 1; overflow: hidden; }

    .video-area { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 12px; }

    .videos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; }

    .video-box {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #0d0d15;
      border: 1px solid var(--border);
    }

    video { width: 100%; height: 100%; object-fit: cover; }

    .video-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 10px;
    }

    .ctrl-btn {
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      cursor: pointer;
    }

    .ctrl-btn.next {
      background: var(--accent);
      border: none;
    }

    .hidden { display: none !important; }

    .sidebar {
      width: 320px;
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-item {
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
    }

    .msg-item.mine {
      background: rgba(124,58,237,0.2);
      align-self: flex-end;
    }

    .msg-item.theirs {
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .msg-item.system {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid var(--border);
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      background: var(--bg);
      border: none;
      color: var(--text);
    }

    .send-btn {
      padding: 10px 14px;
      background: var(--accent);
      border: none;
      color: white;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      padding: 20px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo-sm">Nexara</div>
  <div>
    <span id="user-name"></span>
    <button onclick="signOut()">🚪</button>
  </div>
</header>

<div class="main">

  <div class="video-area">

    <div class="videos">
      <div class="video-box">
        <video id="local-video" autoplay muted playsinline></video>
        <div class="video-label">You</div>
      </div>

      <div class="video-box">
        <video id="remote-video" autoplay playsinline></video>
        <div class="video-label" id="remote-label">Stranger</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn next" id="start-btn" onclick="startChat()">Start</button>
      <button class="ctrl-btn hidden" id="next-btn" onclick="nextPartner()">Next</button>
      <span id="waiting-text"></span>
    </div>

  </div>

  <div class="sidebar">

    <div class="messages" id="messages"></div>

    <div class="chat-input">
      <input id="chat-input" onkeydown="onChatKey(event)" placeholder="Type..." />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

  </div>

</div>

<div class="modal-overlay" id="signout-modal">
  <div class="modal">
    <p>Sign out?</p>
    <button onclick="closeModal()">Cancel</button>
    <button onclick="confirmSignOut()">Yes</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { firebaseConfig, BACKEND_URL } from "./js/config.js";

/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* STATE */
let user = null;
let data = null;
let socket = null;
let pc = null;
let stream = null;
let partnerId = null;

const ICE = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

/* AUTH */
onAuthStateChanged(auth, async (u) => {
  if (!u) return (window.location.href = "index.html");

  user = u;
  const snap = await getDoc(doc(db, "users", u.uid));
  data = snap.exists() ? snap.data() : { displayName: "User" };

  document.getElementById("user-name").textContent = data.displayName;

  initSocket();
});

/* SOCKET */
function initSocket() {
  socket = io(BACKEND_URL);

  socket.on("matched", async ({ partnerId: pid }) => {
    partnerId = pid;
    addMsg("Connected", "", "system");
    await setupPeer(true);
  });

  socket.on("signal", async ({ from, data }) => {
    if (!pc) return;

    if (data.type === "offer") {
      await pc.setRemoteDescription(data);
      const ans = await pc.createAnswer();
      await pc.setLocalDescription(ans);
      socket.emit("signal", { to: from, data: ans });
    }

    if (data.type === "answer") {
      await pc.setRemoteDescription(data);
    }

    if (data.candidate) {
      await pc.addIceCandidate(data);
    }
  });
}

/* PEER */
async function setupPeer(initiator) {
  pc = new RTCPeerConnection(ICE);

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("local-video").srcObject = stream;

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = (e) => {
    document.getElementById("remote-video").srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit("signal", { to: partnerId, data: e.candidate });
    }
  };

  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { to: partnerId, data: offer });
  }
}

/* CHAT */
window.sendMessage = () => {
  const i = document.getElementById("chat-input");
  const msg = i.value.trim();
  if (!msg) return;

  addMsg(msg, "You", "mine");
  socket.emit("chat", { to: partnerId, msg });
  i.value = "";
};

window.onChatKey = (e) => {
  if (e.key === "Enter") sendMessage();
};

/* UI */
function addMsg(t, n, type) {
  const d = document.createElement("div");
  d.className = `msg-item ${type}`;
  d.textContent = t;
  document.getElementById("messages").appendChild(d);
}

/* START */
window.startChat = () => {
  socket.emit("find");
  document.getElementById("start-btn").classList.add("hidden");
  document.getElementById("next-btn").classList.remove("hidden");
};

window.nextPartner = () => {
  socket.emit("skip");
  pc?.close();
  pc = null;
};

/* SIGN OUT */
window.signOut = () => document.getElementById("signout-modal").classList.add("open");
window.closeModal = () => document.getElementById("signout-modal").classList.remove("open");

window.confirmSignOut = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};
</script>

</body>
</html>
