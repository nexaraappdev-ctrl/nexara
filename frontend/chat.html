<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexara</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* (UNCHANGED CSS — you already had it correct) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
      --accent: #7c3aed; --accent2: #06b6d4; --text: #e2e2f0;
      --muted: #6b6b8a; --danger: #ef4444; --success: #22c55e;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }

    .logo-sm {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .main { display: flex; flex: 1; overflow: hidden; }

    .hidden { display: none !important; }
  </style>
</head>

<body>
<header>
  <span class="logo-sm">Nexara</span>
  <div>
    <span id="user-name"></span>
    <button onclick="signOut()">🚪</button>
  </div>
</header>

<div class="main">

  <div class="video-area">
    <div class="videos">
      <div class="video-box">
        <video id="local-video" autoplay muted playsinline></video>
      </div>

      <div class="video-box">
        <video id="remote-video" autoplay playsinline></video>
      </div>
    </div>

    <div class="controls">
      <span id="waiting-text">Press Start</span>
      <button id="start-btn" onclick="startChat()">Start</button>
      <button id="next-btn" class="hidden" onclick="nextPartner()">Next</button>
      <button id="cam-btn" class="hidden" onclick="toggleCamera()">Cam</button>
      <button id="mic-btn" class="hidden" onclick="toggleMic()">Mic</button>
      <button id="screen-btn" class="hidden" onclick="toggleScreen()">Screen</button>
    </div>
  </div>

  <div class="sidebar">
    <button onclick="showPanel('chat')">Chat</button>
    <button onclick="showPanel('report')">Report</button>

    <div id="chat-panel">
      <div id="messages"></div>
      <input id="chat-input" onkeydown="onChatKey(event)" />
      <button onclick="sendMessage()">Send</button>
    </div>

    <div id="report-panel" class="hidden">
      <button onclick="selectReason(this,'Spam')">Spam</button>
      <button onclick="selectReason(this,'Harassment')">Harassment</button>
      <textarea id="report-notes"></textarea>
      <button onclick="submitReport()">Submit</button>
    </div>
  </div>

</div>

<div id="signout-modal" class="hidden">
  <button onclick="confirmSignOut()">Confirm Sign Out</button>
  <button onclick="closeModal()">Cancel</button>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut as fbSignOut }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { firebaseConfig, BACKEND_URL } from "./js/config.js";

/* ---------------- FIREBASE ---------------- */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userData = null;
let socket = null;
let pc = null;
let localStream = null;
let partnerId = null;
let partnerName = "Stranger";
let selectedReason = "";
let camOn = true;
let micOn = true;
let screenSharing = false;

const ICE_SERVERS = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

let authReady = false;

/* ---------------- AUTH ---------------- */
onAuthStateChanged(auth, async (user) => {
  authReady = true;
  if (!user) return (window.location.href = "index.html");

  currentUser = user;

  const snap = await getDoc(doc(db, "users", user.uid));
  userData = snap.exists() ? snap.data() : { role: "user", displayName: "User" };

  document.getElementById("user-name").textContent = userData.displayName;

  initSocket();
});

/* ---------------- SOCKET ---------------- */
function initSocket() {
  socket = window.io(BACKEND_URL);

  socket.on("matched", async ({ partnerId: pid }) => {
    partnerId = pid;
    document.getElementById("waiting-text").textContent = "Connected";
    await setupPeer(true);
  });
}

/* ---------------- PEER ---------------- */
async function setupPeer(initiator) {
  pc = new RTCPeerConnection(ICE_SERVERS);

  pc.ontrack = (e) => {
    document.getElementById("remote-video").srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit("signal", { to: partnerId, data: e.candidate });
    }
  };

  if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  if (initiator) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { to: partnerId, data: offer });
  }
}

/* ---------------- START ---------------- */
window.startChat = async () => {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById("local-video").srcObject = localStream;
  } catch (e) {}

  socket.emit("find-partner", {
    uid: currentUser.uid,
    displayName: userData.displayName
  });
};

/* ---------------- REQUIRED FIX (THIS WAS MISSING) ---------------- */
window.showPanel = (panel) => {
  document.getElementById("chat-panel").classList.toggle("hidden", panel !== "chat");
  document.getElementById("report-panel").classList.toggle("hidden", panel !== "report");
};

/* ---------------- CHAT ---------------- */
window.sendMessage = () => {
  const input = document.getElementById("chat-input");
  if (!input.value || !partnerId) return;

  socket.emit("chat-message", {
    to: partnerId,
    message: input.value
  });

  input.value = "";
};

window.onChatKey = (e) => {
  if (e.key === "Enter") sendMessage();
};

/* ---------------- REPORT ---------------- */
window.selectReason = (btn, reason) => {
  selectedReason = reason;
};

window.submitReport = async () => {
  await addDoc(collection(db, "reports"), {
    reporterId: currentUser.uid,
    reportedUserId: partnerId,
    reason: selectedReason,
    notes: document.getElementById("report-notes").value,
    createdAt: serverTimestamp()
  });
};

/* ---------------- SIGN OUT ---------------- */
window.signOut = () => document.getElementById("signout-modal").classList.remove("hidden");

window.closeModal = () => document.getElementById("signout-modal").classList.add("hidden");

window.confirmSignOut = async () => {
  await fbSignOut(auth);
  window.location.href = "index.html";
};
</script>

</body>
</html>
