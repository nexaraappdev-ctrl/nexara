<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexara — Staff Panel</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a0f; --surface:#12121a; --border:#1e1e2e;
      --accent:#7c3aed; --accent2:#06b6d4; --text:#e2e2f0;
      --muted:#6b6b8a; --danger:#ef4444; --success:#22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    header {
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 28px;
      background:var(--surface);
      border-bottom:1px solid var(--border);
    }

    .logo { font-family:Syne; font-weight:800; }

    .container {
      max-width:1100px;
      margin:0 auto;
      padding:30px 20px;
    }

    h1 { font-family:Syne; margin-bottom:6px; }

    .subtitle { color:var(--muted); font-size:0.8rem; margin-bottom:25px; }

    .section {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      margin-bottom:20px;
      overflow:hidden;
    }

    .section-header {
      padding:16px;
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:space-between;
    }

    table { width:100%; border-collapse:collapse; }

    th, td {
      padding:12px;
      border-bottom:1px solid #1a1a25;
      font-size:0.8rem;
      text-align:left;
    }

    th { color:var(--muted); font-size:0.7rem; text-transform:uppercase; }

    .badge {
      padding:3px 8px;
      border-radius:20px;
      font-size:0.7rem;
    }

    .pending { background:rgba(250,204,21,0.15); color:#facc15; }
    .resolved { background:rgba(34,197,94,0.15); color:var(--success); }
    .dismissed { background:rgba(107,107,138,0.15); color:var(--muted); }

    button {
      cursor:pointer;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      font-size:0.75rem;
      font-family:inherit;
    }

    .resolve { background:rgba(34,197,94,0.2); color:var(--success); }
    .ban { background:rgba(239,68,68,0.2); color:#f87171; }

    .search {
      display:flex;
      gap:10px;
      padding:12px;
      border-bottom:1px solid var(--border);
    }

    input {
      flex:1;
      padding:8px;
      background:var(--bg);
      border:1px solid var(--border);
      color:var(--text);
      border-radius:6px;
    }

    #access { display:none; text-align:center; padding:60px; color:var(--danger); }
  </style>
</head>

<body>

<header>
  <div class="logo">Nexara</div>
  <a href="chat.html" style="color:var(--muted); text-decoration:none;">Back</a>
</header>

<div id="access">
  <h2>Access Denied</h2>
</div>

<div class="container" id="app" style="display:none">

  <h1>Staff Dashboard</h1>
  <div class="subtitle" id="sub">Loading...</div>

  <div class="section">
    <div class="section-header">
      <strong>Reports</strong>
    </div>
    <div id="reports">Loading...</div>
  </div>

  <div class="section">
    <div class="section-header">
      <strong>User Search</strong>
    </div>

    <div class="search">
      <input id="searchInput" placeholder="email or username"/>
      <button onclick="searchUsers()">Search</button>
    </div>

    <div id="users"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  getDocs,
  collection,
  query,
  where,
  orderBy,
  limit,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { firebaseConfig } from "./js/config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const STAFF = ["moderator","admin","manager","founder"];

let me = null;

// ---------------- AUTH ----------------
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "index.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  me = snap.data();

  if (!me || !STAFF.includes(me.role)) {
    document.getElementById("access").style.display = "block";
    return;
  }

  document.getElementById("app").style.display = "block";
  document.getElementById("sub").textContent =
    `Logged in as ${me.displayName} (${me.role})`;

  loadReports();
});

// ---------------- REPORTS ----------------
async function loadReports() {
  const q = query(
    collection(db,"reports"),
    orderBy("createdAt","desc"),
    limit(50)
  );

  const snap = await getDocs(q);

  const reports = snap.docs.map(d => ({id:d.id,...d.data()}));

  document.getElementById("reports").innerHTML = `
    <table>
      <tr>
        <th>Reason</th>
        <th>Reporter</th>
        <th>Reported</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>

      ${reports.map(r => `
        <tr>
          <td>${r.reason || "—"}</td>
          <td>${r.reporterName || "—"}</td>
          <td>${r.reportedUserName || r.reportedSocketId || "—"}</td>
          <td><span class="badge ${r.status}">${r.status}</span></td>
          <td>
            <button onclick="viewChats('${r.reporterId}','${r.reportedUserId}')">Chats</button>

            ${r.status==="pending" ? `
              <button class="resolve" onclick="setStatus('${r.id}','resolved')">Resolve</button>
              <button class="ban" onclick="setStatus('${r.id}','dismissed')">Dismiss</button>
            ` : ""}
          </td>
        </tr>
      `).join("")}
    </table>
  `;
}

// ---------------- UPDATE ----------------
window.setStatus = async (id,status) => {
  await updateDoc(doc(db,"reports",id),{
    status,
    resolvedBy: me.displayName,
    resolvedAt: serverTimestamp()
  });

  loadReports();
};

// ---------------- SEARCH USERS ----------------
window.searchUsers = async () => {
  const val = document.getElementById("searchInput").value.trim();
  if (!val) return;

  const q = query(
    collection(db,"users"),
    where("displayName","==",val),
    limit(10)
  );

  const snap = await getDocs(q);

  document.getElementById("users").innerHTML =
    snap.docs.map(d => {
      const u = d.data();
      return `<div style="padding:10px;border-bottom:1px solid #222">
        <b>${u.displayName}</b> — ${u.email || "no email"}
      </div>`;
    }).join("") || "No users found";
};

// ---------------- CHAT VIEW ----------------
window.viewChats = async (a,b) => {
  if (!a || !b) return alert("Missing chat data");

  const chatId = [a,b].sort().join("_");

  const snap = await getDocs(
    query(
      collection(db,"chats",chatId,"messages"),
      orderBy("createdAt","desc"),
      limit(10)
    )
  );

  const msgs = snap.docs.map(d => d.data()).reverse();

  alert(
    msgs.length
      ? msgs.map(m => `${m.senderName}: ${m.message}`).join("\n")
      : "No messages"
  );
};
</script>

</body>
</html>
