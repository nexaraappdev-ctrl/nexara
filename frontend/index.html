<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RandomChat — Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e2e2f0;
      --muted: #6b6b8a;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
      pointer-events: none;
    }
    .orb1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
    .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; }

    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 16px;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
      font-family: 'Syne', sans-serif;
    }
    .logo h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .logo p { color: var(--muted); font-size: 0.8rem; margin-top: 6px; letter-spacing: 0.1em; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      backdrop-filter: blur(10px);
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: white;
    }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.08em; }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-google {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google:hover { border-color: var(--accent); background: rgba(124,58,237,0.05); }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    .phone-row { display: flex; gap: 8px; }
    .phone-row input:first-child { max-width: 90px; }
    .btn-sm {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--accent); }

    .msg { font-size: 0.8rem; margin-top: 12px; text-align: center; padding: 10px; border-radius: 8px; }
    .msg.error { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .msg.success { background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }

    #recaptcha-container { margin: 12px 0; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>

  <div class="container">
    <div class="logo">
      <h1>RandomChat</h1>
      <p>MEET SOMEONE NEW</p>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Email/Password Form -->
      <div id="email-section">
        <div class="form-group" id="username-group" style="display:none">
          <label>USERNAME</label>
          <input type="text" id="username" placeholder="choose a username" />
        </div>
        <div class="form-group">
          <label>EMAIL</label>
          <input type="email" id="email" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>PASSWORD</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" id="email-btn" onclick="handleEmail()">Sign In</button>
      </div>

      <div class="divider">or</div>

      <!-- Google -->
      <button class="btn btn-google" style="margin-bottom:12px" onclick="signInGoogle()">
        <svg viewBox="0 0 48 48"><path fill="#4285F4" d="M45.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.6h11.9c-.5 2.7-2 5-4.3 6.6v5.5h7c4.1-3.8 6.5-9.4 6.5-16.2z"/><path fill="#34A853" d="M24 46c5.9 0 10.9-2 14.5-5.3l-7-5.5c-2 1.3-4.5 2.1-7.5 2.1-5.8 0-10.7-3.9-12.4-9.2H4.3v5.7C7.9 41.1 15.4 46 24 46z"/><path fill="#FBBC05" d="M11.6 28.1c-.4-1.3-.7-2.7-.7-4.1s.2-2.8.7-4.1v-5.7H4.3C2.8 17.3 2 20.5 2 24s.8 6.7 2.3 9.8l7.3-5.7z"/><path fill="#EA4335" d="M24 10.7c3.3 0 6.2 1.1 8.5 3.3l6.4-6.4C35 4 30 2 24 2 15.4 2 7.9 6.9 4.3 14.2l7.3 5.7c1.7-5.3 6.6-9.2 12.4-9.2z"/></svg>
        Continue with Google
      </button>

      <!-- Phone -->
      <div id="phone-section">
        <div class="form-group">
          <label>PHONE NUMBER</label>
          <div class="phone-row">
            <input type="text" value="+1" id="country-code" />
            <input type="tel" id="phone" placeholder="(555) 000-0000" style="flex:1" />
            <button class="btn-sm" onclick="sendOTP()">Send Code</button>
          </div>
        </div>
        <div id="otp-group" class="form-group hidden">
          <label>VERIFICATION CODE</label>
          <div class="phone-row">
            <input type="text" id="otp-code" placeholder="123456" style="flex:1" />
            <button class="btn-sm" onclick="verifyOTP()">Verify</button>
          </div>
        </div>
        <div id="recaptcha-container"></div>
      </div>

      <div id="auth-msg"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
      signInWithPopup, GoogleAuthProvider, RecaptchaVerifier,
      signInWithPhoneNumber, onAuthStateChanged, updateProfile
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { firebaseConfig } from "./js/config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let confirmationResult = null;
    let currentTab = "login";

    window.switchTab = (tab) => {
      currentTab = tab;
      document.querySelectorAll(".tab").forEach((t, i) => {
        t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "signup"));
      });
      document.getElementById("email-btn").textContent = tab === "login" ? "Sign In" : "Create Account";
      document.getElementById("username-group").style.display = tab === "signup" ? "block" : "none";
      document.getElementById("auth-msg").innerHTML = "";
    };

    function showMsg(text, type) {
      document.getElementById("auth-msg").innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    async function ensureUserDoc(user, extra = {}) {
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          uid: user.uid,
          displayName: extra.displayName || user.displayName || "User",
          email: user.email || "",
          phone: user.phoneNumber || "",
          role: "user",
          createdAt: serverTimestamp(),
          banned: false,
        });
      }
      return (await getDoc(ref)).data();
    }

    window.handleEmail = async () => {
      const email = document.getElementById("email").value.trim();
      const pass = document.getElementById("password").value;
      const btn = document.getElementById("email-btn");
      btn.disabled = true;
      try {
        if (currentTab === "login") {
          await signInWithEmailAndPassword(auth, email, pass);
        } else {
          const username = document.getElementById("username").value.trim();
          if (!username) { showMsg("Username required", "error"); btn.disabled = false; return; }
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          await updateProfile(cred.user, { displayName: username });
          await ensureUserDoc(cred.user, { displayName: username });
        }
      } catch (e) {
        showMsg(e.message.replace("Firebase: ", ""), "error");
        btn.disabled = false;
      }
    };

    window.signInGoogle = async () => {
      try {
        const result = await signInWithPopup(auth, new GoogleAuthProvider());
        await ensureUserDoc(result.user);
      } catch (e) {
        showMsg(e.message.replace("Firebase: ", ""), "error");
      }
    };

    window.sendOTP = async () => {
      const phone = document.getElementById("country-code").value + document.getElementById("phone").value.replace(/\D/g, "");
      try {
        window.recaptchaVerifier = new RecaptchaVerifier(auth, "recaptcha-container", { size: "normal" });
        confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
        document.getElementById("otp-group").classList.remove("hidden");
        showMsg("Code sent!", "success");
      } catch (e) {
        showMsg(e.message.replace("Firebase: ", ""), "error");
      }
    };

    window.verifyOTP = async () => {
      const code = document.getElementById("otp-code").value.trim();
      try {
        const result = await confirmationResult.confirm(code);
        await ensureUserDoc(result.user);
      } catch (e) {
        showMsg("Invalid code", "error");
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const data = await ensureUserDoc(user);
        if (data.banned) {
          showMsg("Your account has been banned.", "error");
          auth.signOut();
          return;
        }
        window.location.href = "chat.html";
      }
    });
  </script>
</body>
</html>
